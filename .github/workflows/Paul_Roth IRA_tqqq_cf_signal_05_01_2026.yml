name: Paul Roth IRA TQQQ Crash Fund Signal Daily

on:
  schedule:
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

jobs:
  signal:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run Paul Roth IRA TQQQ CF Signal
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: python "Paul_Roth IRA_TQQQ 투자 신호_Crash Fund_05_01_2026.py"
