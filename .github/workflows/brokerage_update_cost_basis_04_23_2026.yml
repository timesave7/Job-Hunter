name: Update Brokerage COST_BASIS

on:
  workflow_dispatch:
    inputs:
      new_cost_basis:
        description: '새 취득단가 입력 (실제 체결가, 예: 67.30)'
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update brokerage_state.json
        run: |
          python -c "
          import json, os
          from datetime import datetime

          state_file = 'brokerage_state.json'

          if os.path.exists(state_file):
              with open(state_file, 'r') as f:
                  state = json.load(f)
          else:
              state = {'cost_basis': 60.0, 'previous_basis': 60.0, 'last_updated': ''}

          old = state['cost_basis']
          new = float('${{ github.event.inputs.new_cost_basis }}')
          state['previous_basis'] = old
          state['cost_basis'] = new
          state['last_updated'] = datetime.now().strftime('%Y-%m-%d')

          with open(state_file, 'w') as f:
              json.dump(state, f, indent=2, ensure_ascii=False)

          print(f'✅ Brokerage COST_BASIS 업데이트 완료: \${old} → \${new}')
          "

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add brokerage_state.json
          git commit -m "Update Brokerage COST_BASIS to ${{ github.event.inputs.new_cost_basis }}"
          git push
