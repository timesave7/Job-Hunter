name: Job Hunter Daily

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Job Hunter
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
        run: python job_hunter.py

      - name: Save seen jobs history
        run: |
          git config user.name "Job Hunter Bot"
          git config user.email "bot@jobhunter.local"
          git add seen_jobs.json || true
          git commit -m "Update seen jobs $(date +%Y-%m-%d)" || true
          git push || true
